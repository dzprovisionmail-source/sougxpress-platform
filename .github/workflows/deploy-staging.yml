name: Deploy to Supabase Staging

on:
  workflow_dispatch:
    inputs:
      reset_staging:
        description: "Reset staging before applying migrations"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Exclude CI-only auth stub
        run: |
          rm -f supabase/migrations/_000_auth_stub.sql

      - name: Apply migrations
        run: |
          if [ "${{ inputs.reset_staging }}" = "true" ]; then
            echo "Resetting the staging database..."
            supabase db reset --linked --no-seed --yes
          else
            echo "Applying pending migrations..."
            supabase db push --linked --include-all --yes
          fi

      - name: Verify migration history
        run: |
          supabase migration list --linked

      - name: Lint staging database
        run: |
          supabase db lint --linked --fail-on error

      - name: Generate TypeScript types
        run: |
          mkdir -p src/types
          supabase gen types typescript \
            --project-id "${{ secrets.SUPABASE_PROJECT_ID }}" \
            --schema public \
            > src/types/supabase.ts

      - name: Commit generated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types/supabase.ts

          if git diff --cached --quiet; then
            echo "No TypeScript type changes."
          else
            git commit -m "chore: update Supabase types from staging"
            git push origin HEAD:main
          fi
